{% extends "base.html" %}

{% block content %}
<h2 class="my-4">Scan QR Code</h2>
<video id="qr-video" class="w-100"></video>
<div id="qr-result" class="mt-3"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
    const video = document.getElementById('qr-video');
    const resultDiv = document.getElementById('qr-result');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(stream) {
            video.srcObject = stream;
            video.setAttribute("playsinline", true); // required to tell iOS safari we don't want fullscreen
            video.play();
            requestAnimationFrame(tick);
        });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const canvasElement = document.createElement('canvas');
            const canvas = canvasElement.getContext('2d');
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
            });

            if (code) {
                drawLine(code.location.topLeftCorner, code.location.topRightCorner, "#FF3B58");
                // ... and so on for other corners

                resultDiv.textContent = `Found QR code with data: ${code.data}`;
                markAttendance(code.data);
                // Stop the camera after scanning
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }
        requestAnimationFrame(tick);
    }
    
    function drawLine(begin, end, color) {
        const canvas = document.createElement('canvas').getContext('2d');
        canvas.beginPath();
        canvas.moveTo(begin.x, begin.y);
        canvas.lineTo(end.x, end.y);
        canvas.lineWidth = 4;
        canvas.strokeStyle = color;
        canvas.stroke();
    }

    async function markAttendance(userId) {
        const response = await fetch('/mark_attendance', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ user_id: userId }),
        });
        const result = await response.json();
        alert(result.message);
        window.location.href = "/";
    }
</script>
{% endblock %}
